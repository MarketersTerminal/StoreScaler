<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .title { font-size: 16px; font-weight: 700; fill: #e0e0e0; }
    .platform { font-size: 11px; font-weight: 600; fill: #00ff88; }
    .action { font-size: 9px; fill: #999; }
    .badge-setup { font-size: 8px; font-weight: 600; fill: #000; }
    .badge-ongoing { font-size: 8px; font-weight: 600; fill: #000; }
  </style>

  <rect width="800" height="400" fill="#0a0a0a" rx="12"/>

  <text x="400" y="30" text-anchor="middle" class="title">STORE SCALER EXECUTION MAP</text>

  <!-- One Time Setup Row -->
  <rect x="20" y="50" width="90" height="18" rx="4" fill="#00ff88"/>
  <text x="65" y="63" text-anchor="middle" class="badge-setup">ONE TIME SETUP</text>

  <!-- Meta -->
  <rect x="20" y="80" width="150" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="95" y="98" text-anchor="middle" class="platform">META ADS</text>
  <text x="95" y="112" text-anchor="middle" class="action">Campaign architecture</text>
  <text x="95" y="124" text-anchor="middle" class="action">Pixel and CAPI audit</text>
  <text x="95" y="136" text-anchor="middle" class="action">Audience mapping</text>

  <!-- Google -->
  <rect x="180" y="80" width="150" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="255" y="98" text-anchor="middle" class="platform">GOOGLE / YOUTUBE</text>
  <text x="255" y="112" text-anchor="middle" class="action">Shopping feed setup</text>
  <text x="255" y="124" text-anchor="middle" class="action">PMAX launcher</text>
  <text x="255" y="136" text-anchor="middle" class="action">YouTube pre roll</text>

  <!-- TikTok -->
  <rect x="340" y="80" width="150" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="415" y="98" text-anchor="middle" class="platform">TIKTOK</text>
  <text x="415" y="112" text-anchor="middle" class="action">Account structure</text>
  <text x="415" y="124" text-anchor="middle" class="action">Shop campaign setup</text>
  <text x="415" y="136" text-anchor="middle" class="action">Spark ads activation</text>

  <!-- Klaviyo -->
  <rect x="500" y="80" width="150" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="575" y="98" text-anchor="middle" class="platform">KLAVIYO</text>
  <text x="575" y="112" text-anchor="middle" class="action">Flow architecture</text>
  <text x="575" y="124" text-anchor="middle" class="action">Segmentation engine</text>
  <text x="575" y="136" text-anchor="middle" class="action">List growth system</text>

  <!-- Shopify -->
  <rect x="660" y="80" width="120" height="70" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="720" y="98" text-anchor="middle" class="platform">SHOPIFY</text>
  <text x="720" y="112" text-anchor="middle" class="action">Product page audit</text>
  <text x="720" y="124" text-anchor="middle" class="action">Collection optimizer</text>
  <text x="720" y="136" text-anchor="middle" class="action">SEO audit</text>

  <!-- Ongoing Row -->
  <rect x="20" y="170" width="120" height="18" rx="4" fill="#ff9900"/>
  <text x="80" y="183" text-anchor="middle" class="badge-ongoing">ONGOING WEEKLY/MONTHLY</text>

  <!-- Meta Ongoing -->
  <rect x="20" y="200" width="150" height="80" rx="6" fill="#1a1a1a" stroke="#ff9900" stroke-width="1"/>
  <text x="95" y="218" text-anchor="middle" class="platform" style="fill:#ff9900">META ADS</text>
  <text x="95" y="232" text-anchor="middle" class="action">Creative testing [W]</text>
  <text x="95" y="244" text-anchor="middle" class="action">Campaign scaling [W]</text>
  <text x="95" y="256" text-anchor="middle" class="action">Retargeting refresh [2W]</text>
  <text x="95" y="268" text-anchor="middle" class="action">Audience expansion [M]</text>

  <!-- Google Ongoing -->
  <rect x="180" y="200" width="150" height="80" rx="6" fill="#1a1a1a" stroke="#ff9900" stroke-width="1"/>
  <text x="255" y="218" text-anchor="middle" class="platform" style="fill:#ff9900">GOOGLE / YOUTUBE</text>
  <text x="255" y="232" text-anchor="middle" class="action">Shopping bid optimizer [W]</text>
  <text x="255" y="244" text-anchor="middle" class="action">PMAX asset refresh [M]</text>
  <text x="255" y="256" text-anchor="middle" class="action">Search campaign tuner [W]</text>
  <text x="255" y="268" text-anchor="middle" class="action">YouTube launcher [M]</text>

  <!-- Klaviyo Ongoing -->
  <rect x="340" y="200" width="150" height="80" rx="6" fill="#1a1a1a" stroke="#ff9900" stroke-width="1"/>
  <text x="415" y="218" text-anchor="middle" class="platform" style="fill:#ff9900">KLAVIYO</text>
  <text x="415" y="232" text-anchor="middle" class="action">Campaign calendar [M]</text>
  <text x="415" y="244" text-anchor="middle" class="action">Flow optimizer [M]</text>
  <text x="415" y="256" text-anchor="middle" class="action">SMS sequencer [2W]</text>
  <text x="415" y="268" text-anchor="middle" class="action">A/B test launcher [W]</text>

  <!-- Profit Ops Ongoing -->
  <rect x="500" y="200" width="280" height="80" rx="6" fill="#1a1a1a" stroke="#ff9900" stroke-width="1"/>
  <text x="640" y="218" text-anchor="middle" class="platform" style="fill:#ff9900">PROFIT OPS</text>
  <text x="570" y="232" text-anchor="middle" class="action">Weekly checklist [W]</text>
  <text x="570" y="244" text-anchor="middle" class="action">Budget reallocation [W]</text>
  <text x="570" y="256" text-anchor="middle" class="action">ROAS optimizer [W]</text>
  <text x="710" y="232" text-anchor="middle" class="action">CAC audit [M]</text>
  <text x="710" y="244" text-anchor="middle" class="action">Monthly report [M]</text>
  <text x="710" y="256" text-anchor="middle" class="action">Quarterly roadmap [Q]</text>
  <text x="640" y="268" text-anchor="middle" class="action">Winner product scaler [W]</text>

  <!-- Legend -->
  <text x="20" y="310" class="action">[W] = Weekly  [2W] = Bi weekly  [M] = Monthly  [Q] = Quarterly</text>

  <!-- Bottom bar -->
  <rect x="20" y="330" width="760" height="50" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="400" y="352" text-anchor="middle" style="font-size:11px; fill:#e0e0e0; font-weight:600;">Paste a command → Replace variables → Execute → Deploy to platform</text>
  <text x="400" y="368" text-anchor="middle" class="action">Every command logs to your private dashboard at localhost:3000</text>
</svg>
